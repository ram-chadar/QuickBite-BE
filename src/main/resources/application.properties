spring.application.name=QuickBite
server.port=8080

# Datasource
spring.datasource.url=jdbc:mysql://localhost:3306/quickbite?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate Properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# JWT (defaults live in com.sit.qb.security.JwtConstants; uncomment to override)
#quickbite.jwt.secret=
#quickbite.jwt.expiration-ms=3600000

